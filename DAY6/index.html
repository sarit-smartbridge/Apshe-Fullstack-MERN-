<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning DOM</title>
</head>
<body>

    <!-- Example 1: Selecting and changing elements -->
    <h1 id="title">Hello, World!</h1>
    <p class="info">This is a simple paragraph.</p>

    <!-- Example 2: Creating new elements -->
    <ul id="tasklist"></ul>

    <!-- Example 3: Removing elements -->
    <p class="notice">This is a temporary message</p>

    <!-- Example 4: Handling button click -->
    <input id="nameBox" placeholder="type name">
    <button id="submitBtn">Submit me</button>
    <h2 id="output"></h2>

    <!-- Example 5: Handling form submit -->
    <form id="LoginForm">
        <input id="user" placeholder="Username">
        <button type="submit">Submit</button>
    </form>
    <p id="msg"></p>

    <script src="index.js"></script>
</body>
</html>
